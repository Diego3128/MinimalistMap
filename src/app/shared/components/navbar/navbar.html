<div class="relative navbar bg-gray-950/80 shadow-sm transition-all z-30">
  <!-- button to show/hide navbar -->

  <div class="absolute w-full -bottom-5 left-0 h-5 flex justify-center items-center">
    <button
      (click)="toggleShowNavBar()"
      class="cursor-pointer bg-gray-950 rounded-b-2xl w-24 flex items-center justify-center"
    >
      @if (showNavBar()) {
        <i class="material-icons large text-[40px]!"> keyboard_arrow_up </i>
      } @else {
        <i class="material-icons text-[40px]!">keyboard_arrow_down</i>
      }
    </button>
  </div>

  <div class="navbar-start">
    <div class="dropdown">
      <div tabindex="0" role="button" class="btn btn-ghost btn-circle">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-5 w-5"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M4 6h16M4 12h16M4 18h7"
          />
        </svg>
      </div>
      <ul
        tabindex="-1"
        class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow"
      >
        @for (route of routes; track route.path) {
          <li>
            <a
              [routerLinkActiveOptions]="{ exact: true }"
              [routerLink]="route.path"
              routerLinkActive="bg-gray-900/10"
              >{{ route.title }}</a
            >
          </li>
        }
      </ul>
    </div>
  </div>
  <div class="navbar-center">
    <span class="btn btn-ghost text-xl uppercase">{{ currentPath() }}</span>
  </div>
  <div class="navbar-end"></div>
</div>
