<div class="group card bg-slate-950 rounded-2xl w-96 custom-shadow overflow-hidden">
  <figure class="relative block min-h-60 w-full">
    <app-minimap
      [initialState]="{
        lat: marker().lat,
        lng: marker().lng,
        popupColor: marker().color,
        popupName: marker().name,
      }"
    />
  </figure>
  <div class="card-body">
    <h2 class="card-title">{{ marker().name }}</h2>
    <p>
      {{ marker().description }}
    </p>
    <ul class="my-4 flex gap-2">
      @for (tag of marker().tags; track tag) {
        <li class="px-2 py-1 text-black font-bold bg-yellow-300 rounded-md">{{ tag }}</li>
      }
    </ul>
  </div>
  <div class="card-actions justify-end">
    <button
      type="button"
      (click)="openInMainMap()"
      class="btn btn-primary font-bold rounded-tl-lg bg-transparent border-0 border-t-2 border-l-2 border-t-amber-300 border-l-amber-300 group-hover:bg-amber-300 group-hover:text-black hover:scale-105 transition-all duration-700"
    >
      See location
    </button>
  </div>
</div>
