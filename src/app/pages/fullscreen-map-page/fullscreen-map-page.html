<div class="relative w-full mx-auto h-[90dvh] mb-10">
  <app-loader [loading]="loadingMap()" />

  <div class="absolute w-full h-full" #mapContainer></div>

  <app-coordinate-summary
    [lat]="coordinates().lat"
    [lng]="coordinates().lng"
    [zoomValue]="zoomValue()"
    (newZoomValue)="onNewZoomValue($event)"
  />
</div>
