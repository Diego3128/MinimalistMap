<div class="relative w-full mx-auto h-full">
  <app-loader [loading]="myMapService.loadingMap()" />

  <div class="absolute w-full h-full" #mapContainer></div>

  <div class="absolute bottom-5 right-10 w-sm max-h-[90dvh] overflow-y-auto">
    <!-- container for options -->
    <div>
      <!-- option to add a new marker -->
      <app-new-marker-form [isCreatingMarker]="myMapService.isCreatingMarker()" />
    </div>

    <app-coordinate-summary
      [lat]="myMapService.coordinates().lat"
      [lng]="myMapService.coordinates().lng"
      [zoomValue]="myMapService.zoomValue()"
      (newZoomValue)="myMapService.onNewZoomValue($event)"
    >
      <div toggle class="flex flex-col gap-y-3">
        <app-toggle
          [label]="'create marker'"
          [isOn]="myMapService.isCreatingMarker()"
          (toggle)="myMapService.toggleCreatingMarker()"
        />

        <app-toggle
          [label]="'marker list'"
          [isOn]="showMarkerList()"
          (toggle)="toggleShowMarkerList()"
        />
      </div>
    </app-coordinate-summary>
  </div>

  <!-- list -->
  <div
    [ngClass]="{
      '-translate-x-full': !showMarkerList(),
      'translate-x-0': showMarkerList(),
    }"
    class="-translate-x-full absolute top-20 left-0 w-full sm:max-w-md transition-all duration-300 bg-gray-950 sm:rounded-tr-2xl sm:rounded-br-2xl min-h-60 max-h-60 p-4 overflow-y-auto"
  >
    <app-marker-list
      [markers]="myMapService.markers()"
      [coordinates]="myMapService.coordinates()"
    />
  </div>
  <!--  -->
</div>
